# Agent Royale task pack: Yahoo Finance quote fields.
#
# These tasks are adapted from the v1 benchmark. The oracle uses Yahoo's chart
# JSON endpoint for the current regular-market price, while the task asks the
# agent to answer from the public Yahoo Finance quote page.
name: yahoo-finance-quotes
description: Exact retrieval tasks for current Yahoo Finance regular-market values.
tasks:
  - id: finance_nvda_regular_market_price
    question: "Using Yahoo Finance, what is NVDA's current regular-market quote price in USD?"
    required_source: "finance.yahoo.com/quote/NVDA"
    answer_type: currency
    tolerance: 5
    labels:
      - finance
      - yahoo_finance
      - stock_quote
      - experiment_task
    notes: "Adapted from the original experiment. Oracle reads chart.result.0.meta.regularMarketPrice."
    ground_truth:
      method: http_json
      url: "https://query1.finance.yahoo.com/v8/finance/chart/NVDA?range=1d&interval=1d"
      field: "chart.result.0.meta.regularMarketPrice"
      source_url: "finance.yahoo.com/quote/NVDA"
      headers:
        User-Agent: "agent-royale-task-pack"

