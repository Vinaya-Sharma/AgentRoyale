# Optional Bright Data task pack.
#
# Requires:
#   BRIGHT_DATA_API_KEY=...
#   BRIGHT_DATA_MCP_URL=https://mcp.brightdata.com/mcp
#
# These tasks demonstrate messy-page ground truth where public APIs are not the
# normal path. They use Bright Data to fetch the source and a source-specific
# regex to extract the exact value.
name: bright-data-ecommerce-pricing
version: 1.0.0
description: Ecommerce price retrieval tasks backed by Bright Data page extraction.
tasks:
  - id: bd_samsung_s25_ultra_256gb_price
    question: "Using Samsung's official US page for the unlocked Galaxy S25 Ultra 256GB SKU, what is the current listed price in USD?"
    required_source: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
    answer_type: currency
    tolerance: 0
    stability: volatile
    ci_safe: false
    labels:
      - bright_data
      - requires_api_key
      - ecommerce
      - pricing
      - samsung
    notes: "Ground truth uses Bright Data page extraction plus a conservative price regex anchored to the product title and base 256GB SKU. Product-page markup can drift; update or quarantine if the parser stops matching."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
      regex: "Galaxy S25 Ultra\\s+\\$\\s*([0-9,]+(?:\\.[0-9]{2})?)\\s+Galaxy S25 Edge"
      require_near_text:
        - "Buy Galaxy S25 Ultra 256GB"
        - "Galaxy S25 Edge"
      source_url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
