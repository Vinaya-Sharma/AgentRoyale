# Optional Bright Data Rapid-mode task pack.
#
# Requires:
#   BRIGHT_DATA_API_KEY=...
#   BRIGHT_DATA_MCP_URL=https://mcp.brightdata.com/mcp
#
# These tasks use search_engine and scrape_as_markdown, which Bright Data
# documents as part of the Rapid free MCP mode. They demonstrate search-result
# and docs-page oracles without requiring Pro structured-data tools.
name: bright-data-rapid-web
version: 1.0.0
description: Free-tier-friendly Bright Data MCP tasks backed by search results and scrape-as-Markdown page extraction.
tasks:
  - id: bd_rapid_docs_search_top_result
    question: "Using Google search results, what is the URL of the first organic result for the query `site:docs.brightdata.com/ai/mcp-server/tools search_engine scrape_as_markdown`?"
    required_source: "google search results"
    answer_type: string
    tolerance: 0
    stability: volatile
    ci_safe: false
    labels:
      - bright_data
      - rapid_mode
      - search_engine
      - source_discovery
    notes: "Ground truth uses Bright Data Rapid-mode search_engine and extracts the first organic result URL from the returned SERP JSON."
    ground_truth:
      method: bright_data
      tool: search_engine
      url: "site:docs.brightdata.com/ai/mcp-server/tools search_engine scrape_as_markdown"
      regex: "\"link\"\\s*:\\s*\"([^\"]+)\""
      source_url: "google search results"

  - id: bd_rapid_mcp_free_requests
    question: "Using Bright Data's MCP Server docs, how many free MCP requests per month are listed?"
    required_source: "docs.brightdata.com/ai/mcp-server/overview"
    answer_type: number
    tolerance: 0
    stability: stable
    labels:
      - bright_data
      - rapid_mode
      - free_tier
      - docs
    source_policy:
      match: same_path
    notes: "Ground truth uses Bright Data Rapid-mode scrape_as_markdown and extracts the documented monthly free request count."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://docs.brightdata.com/ai/mcp-server/overview"
      regex: "MCP Server Overview[\\s\\S]{0,500}?real-time access to public web data with\\s+([0-9,]+)\\s+free requests per month"
      require_near_text:
        - "real-time access to public web data"
        - "zero infrastructure setup"
      source_url: "docs.brightdata.com/ai/mcp-server/overview"

  - id: bd_rapid_python_latest_release
    question: "Using python.org downloads, what is the latest Python 3 release version currently listed?"
    required_source: "python.org/downloads"
    answer_type: string
    tolerance: 0
    stability: semi_stable
    ci_safe: false
    labels:
      - bright_data
      - rapid_mode
      - developer_docs
      - release_version
    notes: "A docs-page freshness task that catches stale release answers while staying inside Rapid-mode page extraction."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.python.org/downloads/"
      regex: "Download the latest source release\\s+\\[Download Python\\s+([0-9]+(?:\\.[0-9]+)+)"
      require_near_text:
        - "Download the latest source release"
      source_url: "python.org/downloads"
