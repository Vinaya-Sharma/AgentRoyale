# Optional Bright Data ecommerce accuracy task pack.
#
# Requires:
#   BRIGHT_DATA_API_KEY=...
#   BRIGHT_DATA_MCP_URL=https://mcp.brightdata.com/mcp
#
# This pack intentionally stays narrow. It uses one dynamic Samsung ecommerce
# page and tests exact variant/title fields that the current Bright Data
# markdown oracle can verify. Price extraction for pages like this should move
# to a Browser API workflow with rendered evidence before being used as a
# scoreable task.
name: bright-data-ecommerce-accuracy-v1
version: 1.0.0
description: Focused ecommerce product-page tasks for Samsung Galaxy S25 Ultra variant and title extraction with Bright Data ground truth.
tasks:
  - id: bd_ecom_v1_samsung_s25_ultra_title_color
    question: "Using Samsung's official US page for the unlocked Galaxy S25 Ultra 256GB SKU, what color is named in the page title?"
    required_source: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
    answer_type: string
    tolerance: 0
    stability: volatile
    ci_safe: false
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - samsung
      - color_variant
    notes: "Extract the color named in the page title. Reject nearby color swatches and online-exclusive colors that are listed but not the page-title SKU color."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
      regex: "Buy Galaxy S25 Ultra 256GB \\| ([^|]+?) Smartphone"
      require_near_text:
        - "Buy Galaxy S25 Ultra 256GB"
      source_url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"

  - id: bd_ecom_v1_samsung_s25_ultra_512gb_price
    question: "Using Samsung's official US page for the unlocked Galaxy S25 Ultra SKU, what price is listed for the 512GB storage option in USD?"
    required_source: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
    answer_type: currency
    tolerance: 0
    stability: volatile
    ci_safe: false
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - samsung
      - storage_price
    notes: "Extract the 512GB price from the Storage section. Reject the base device price, Galaxy S25 Edge price, and unrelated storage/color labels."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
      regex: "Storage\\s+Storage[\\s\\S]{0,120}?512GB\\s+\\$\\s*([0-9,]+(?:\\.[0-9]{2})?)"
      require_near_text:
        - "Storage"
        - "512GB"
      source_url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"

  - id: bd_ecom_v1_samsung_s25_ultra_title_product
    question: "Using Samsung's official US page for the unlocked Galaxy S25 Ultra 256GB SKU, what product title appears before the Price & Deals text?"
    required_source: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
    answer_type: string
    tolerance: 0
    stability: volatile
    ci_safe: false
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - samsung
      - product_title
    notes: "Extract the exact product-title prefix from the page title. Reject navigation labels and shorter family names."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
      regex: "(Buy Galaxy S25 Ultra 256GB \\| Titanium Black Smartphone) \\| Price & Deals"
      require_near_text:
        - "Price & Deals"
      source_url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
