# Optional Bright Data ecommerce accuracy task pack.
#
# Requires:
#   BRIGHT_DATA_API_KEY=...
#   BRIGHT_DATA_MCP_URL=https://mcp.brightdata.com/mcp
#
# These tasks focus on ecommerce extraction mistakes that matter in production:
# list price versus sale price, installment price versus one-time price,
# trade-in credits, seller/variant ambiguity, availability, ratings, and review
# counts. Product pages change often; update or quarantine individual tasks when
# a source changes layout or the target item is no longer available.
name: bright-data-ecommerce-accuracy-v1
description: Ecommerce product-page tasks for exact price, availability, rating, and review-count extraction with Bright Data ground truth.
tasks:
  - id: bd_ecom_v1_bestbuy_airpods_pro_price
    question: "Using the Best Buy product page for Apple AirPods Pro 2 with USB-C case, what is the current price in USD?"
    required_source: "https://www.bestbuy.com/site/apple-airpods-pro-2nd-generation-with-magsafe-case-usb-c-white/6447382.p"
    answer_type: currency
    tolerance: 0
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - best_buy
      - price
    notes: "Extract the current product price, not the list price, financing amount, savings amount, protection-plan price, or price from another AirPods variant."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.bestbuy.com/site/apple-airpods-pro-2nd-generation-with-magsafe-case-usb-c-white/6447382.p"
      regex: "\\$\\s*([0-9]+(?:\\.[0-9]{2})?)"
      source_url: "https://www.bestbuy.com/site/apple-airpods-pro-2nd-generation-with-magsafe-case-usb-c-white/6447382.p"

  - id: bd_ecom_v1_bestbuy_airpods_pro_rating
    question: "Using the Best Buy product page for Apple AirPods Pro 2 with USB-C case, what customer rating out of 5 is currently shown?"
    required_source: "https://www.bestbuy.com/site/apple-airpods-pro-2nd-generation-with-magsafe-case-usb-c-white/6447382.p"
    answer_type: number
    tolerance: 0.1
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - best_buy
      - rating
    notes: "Extract the visible customer rating out of 5. Reject review counts, star-distribution percentages, and ratings from similar AirPods products."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.bestbuy.com/site/apple-airpods-pro-2nd-generation-with-magsafe-case-usb-c-white/6447382.p"
      regex: "([0-9](?:\\.[0-9])?)\\s*(?:out of|/)\\s*5"
      source_url: "https://www.bestbuy.com/site/apple-airpods-pro-2nd-generation-with-magsafe-case-usb-c-white/6447382.p"

  - id: bd_ecom_v1_apple_iphone_16_starting_price
    question: "Using Apple's US buy page for iPhone 16, what is the lowest listed new-device price in USD before trade-in or carrier bill credits?"
    required_source: "https://www.apple.com/shop/buy-iphone/iphone-16"
    answer_type: currency
    tolerance: 0
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - apple
      - price
      - variant_sensitive
    notes: "Use Apple's lowest new-device price before trade-in or carrier bill credits. Reject monthly installment amounts, trade-in net prices, carrier offers, and prices for other iPhone families."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.apple.com/shop/buy-iphone/iphone-16"
      regex: "(?:From|from)\\s*\\$\\s*([0-9,]+(?:\\.[0-9]{2})?)"
      source_url: "https://www.apple.com/shop/buy-iphone/iphone-16"

  - id: bd_ecom_v1_apple_macbook_air_13_starting_price
