# Optional Bright Data ecommerce accuracy task pack.
#
# Requires:
#   BRIGHT_DATA_API_KEY=...
#   BRIGHT_DATA_MCP_URL=https://mcp.brightdata.com/mcp
#
# This launch pack uses one dynamic ecommerce page and asks several exact
# variant-sensitive questions from it. Keeping the first public ecommerce pack
# narrow makes the live oracle easier to audit and maintain while still covering
# common product-page mistakes: base model versus related model, selected storage
# versus nearby storage options, and color/variant ambiguity.
name: bright-data-ecommerce-accuracy-v1
description: Focused ecommerce product-page tasks for exact Samsung Galaxy S25 Ultra price and variant extraction with Bright Data ground truth.
tasks:
  - id: bd_ecom_v1_samsung_s25_ultra_256_unlocked_price
    question: "Using Samsung's official US page for the unlocked Galaxy S25 Ultra with 256GB storage in Titanium Black, what is the current listed device price in USD before trade-in?"
    required_source: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
    answer_type: currency
    tolerance: 0
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - samsung
      - price
      - variant_sensitive
      - trade_in_sensitive
    notes: "Extract the listed price for Galaxy S25 Ultra 256GB on Samsung's official US page. Reject prices for Galaxy S25 Edge, 512GB, 1TB, monthly financing, trade-in net prices, and carrier offers."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
      regex: "Galaxy S25 Ultra\\s*\\$\\s*([0-9,]+(?:\\.[0-9]{2})?)"
      source_url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"

  - id: bd_ecom_v1_samsung_s25_ultra_512_storage_price
    question: "Using Samsung's official US page for Galaxy S25 Ultra, what listed price in USD is shown for the 512GB storage option?"
    required_source: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
    answer_type: currency
    tolerance: 0
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - samsung
      - price
      - storage_variant
    notes: "Extract the 512GB storage-option price from the storage selector. Reject the selected 256GB price, 1TB price, related Galaxy S25 Edge price, monthly financing, and trade-in net prices."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
      regex: "512GB\\s*\\$\\s*([0-9,]+(?:\\.[0-9]{2})?)"
      source_url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"

  - id: bd_ecom_v1_samsung_s25_ultra_title_color
    question: "Using Samsung's official US page for the unlocked Galaxy S25 Ultra 256GB SKU, what color is named in the page title?"
    required_source: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
    answer_type: string
    tolerance: 0
    labels:
      - bright_data
      - ecommerce_accuracy_v1
      - samsung
      - color_variant
    notes: "Extract the color named in the page title. Reject nearby color swatches and online-exclusive colors that are listed but not the page-title SKU color."
    ground_truth:
      method: bright_data
      tool: scrape_as_markdown
      url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
      regex: "Buy Galaxy S25 Ultra 256GB \\| ([^|]+?) Smartphone"
      source_url: "https://www.samsung.com/us/smartphones/galaxy-s25-ultra/buy/galaxy-s25-ultra-256gb-unlocked-sku-sm-s938uzkaxaa/"
