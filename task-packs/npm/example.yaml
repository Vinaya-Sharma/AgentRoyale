# Agent Royale task pack: npm package metadata.
#
# These tasks use npm's public registry and download APIs. They are designed to
# catch stale package versions, wrong packages, and confused download windows.
name: npm-packages
description: Exact retrieval tasks for npm versions, licenses, download counts, repository metadata, package size, and engine constraints.
tasks:
  - id: npm_example_react_latest
    question: "Using npm, what is the latest published version of the react package?"
    required_source: "npmjs.com/package/react"
    answer_type: string
    tolerance: 0
    labels:
      - npm
      - package_metadata
      - package_version
    notes: "Ground truth comes from registry.npmjs.org/react/latest version."
    ground_truth:
      method: http_json
      url: "https://registry.npmjs.org/react/latest"
      field: "version"
      source_url: "npmjs.com/package/react"

  - id: npm_example_vite_latest
    question: "Using npm, what is the latest published version of the vite package?"
    required_source: "npmjs.com/package/vite"
    answer_type: string
    tolerance: 0
    labels:
      - npm
      - package_metadata
      - package_version
    notes: "Tests freshness on a fast-moving frontend package."
    ground_truth:
      method: http_json
      url: "https://registry.npmjs.org/vite/latest"
      field: "version"
      source_url: "npmjs.com/package/vite"

  - id: npm_example_typescript_license
    question: "Using npm, what license does the latest typescript package version list?"
    required_source: "npmjs.com/package/typescript"
    answer_type: string
    tolerance: 0
    labels:
      - npm
      - package_metadata
      - license
    notes: "A small exact-string task that catches unsupported or guessed package metadata."
    ground_truth:
      method: http_json
      url: "https://registry.npmjs.org/typescript/latest"
      field: "license"
      source_url: "npmjs.com/package/typescript"

  - id: npm_example_next_weekly_downloads
    question: "Using npm's download stats, how many downloads did the next package have in the last week?"
    required_source: "api.npmjs.org/downloads/point/last-week/next"
    answer_type: number
    tolerance: 0
    labels:
      - npm
      - package_metadata
      - dynamic_count
      - downloads
    notes: "The required source is npm's downloads API; do not accept lifetime downloads or npm package page popularity snippets."
    ground_truth:
      method: http_json
      url: "https://api.npmjs.org/downloads/point/last-week/next"
      field: "downloads"
      source_url: "api.npmjs.org/downloads/point/last-week/next"

  - id: npm_lodash_weekly_downloads
    question: "Using npm's download stats, how many downloads did the lodash package have in the last week?"
    required_source: "api.npmjs.org/downloads/point/last-week/lodash"
    answer_type: number
    tolerance: 5000000
    labels:
      - npm
      - package_metadata
      - dynamic_count
      - downloads
      - experiment_task
    notes: "Adapted from the original experiment. The required source is npm's downloads API."
    ground_truth:
      method: http_json
      url: "https://api.npmjs.org/downloads/point/last-week/lodash"
      field: "downloads"
      source_url: "api.npmjs.org/downloads/point/last-week/lodash"

  - id: npm_react_weekly_downloads
    question: "Using npm's download stats, how many downloads did the react package have in the last week?"
    required_source: "api.npmjs.org/downloads/point/last-week/react"
    answer_type: number
    tolerance: 3000000
    labels:
      - npm
      - package_metadata
      - dynamic_count
      - downloads
      - experiment_task
    notes: "Adapted from the original experiment. The required source is npm's downloads API."
    ground_truth:
      method: http_json
      url: "https://api.npmjs.org/downloads/point/last-week/react"
      field: "downloads"
      source_url: "api.npmjs.org/downloads/point/last-week/react"

  - id: npm_zod_repository_url
    question: "Using npm package metadata, what repository URL does the latest zod package version list?"
    required_source: "npmjs.com/package/zod"
    answer_type: string
    tolerance: 0
    labels:
      - npm
      - package_metadata
      - repository_url
    notes: "Tests whether the stack reads registry metadata exactly instead of returning a nearby GitHub project URL."
    ground_truth:
      method: http_json
      url: "https://registry.npmjs.org/zod/latest"
      field: "repository.url"
      source_url: "npmjs.com/package/zod"

  - id: npm_prettier_unpacked_size
    question: "Using npm package metadata, what unpacked size in bytes does the latest prettier package version list?"
    required_source: "npmjs.com/package/prettier"
    answer_type: number
    tolerance: 0
    labels:
      - npm
      - package_metadata
      - package_size
    notes: "A precise nested metadata field that catches agents that answer with package tarball size, bundle size, or old package-page snippets."
    ground_truth:
      method: http_json
      url: "https://registry.npmjs.org/prettier/latest"
      field: "dist.unpackedSize"
      source_url: "npmjs.com/package/prettier"

  - id: npm_eslint_node_engine
    question: "Using npm package metadata, what node engine requirement does the latest eslint package version list?"
    required_source: "npmjs.com/package/eslint"
    answer_type: string
    tolerance: 0
    labels:
      - npm
      - package_metadata
      - engine_constraint
    notes: "Tests exact retrieval of a dependency constraint, where summaries often drop alternatives or minimum versions."
    ground_truth:
      method: http_json
      url: "https://registry.npmjs.org/eslint/latest"
      field: "engines.node"
      source_url: "npmjs.com/package/eslint"
