# Agent Royale flagship experiment: SaaS pricing v1.
#
# These tasks test exact pricing-page extraction from official public sources.
# They are intentionally limited to pages that returned stable parseable values
# in the launch environment; fragile pricing pages should be added only after
# their oracle is validated.
name: saas-pricing-v1
description: Flagship v1 tasks for exact SaaS and subscription pricing from official pages.
tasks:
  - id: pricev1_notion_plus_annual_monthly
    question: "Using Notion's official pricing page, what is the monthly price in USD for the Plus plan when billed annually?"
    required_source: "notion.com/pricing"
    answer_type: currency
    tolerance: 0
    labels: [dev_web_retrieval_v1, saas_pricing, official_source, annual_monthly_equivalent]
    notes: "Plan name and billing interval matter."
    ground_truth:
      method: http_regex
      url: "https://www.notion.com/pricing"
      regex: "Plus[\\s\\S]{0,3000}?\\$\\s*([0-9]+(?:\\.[0-9]{2})?)"
      source_url: "notion.com/pricing"

