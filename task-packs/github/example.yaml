# Agent Royale task pack: GitHub repository metadata.
#
# These tasks use GitHub's public REST API as the ground-truth adapter and ask
# the tested stack to answer from GitHub-facing sources. This is a good starter
# pack because the facts are dynamic but the oracle is clean and deterministic.
name: github-metadata
description: Exact retrieval tasks for GitHub repository counts, releases, files, branches, and licenses.
tasks:
  - id: github_nextjs_stars
    question: "Using GitHub, how many stars does the vercel/next.js repository currently have?"
    required_source: "github.com/vercel/next.js"
    answer_type: number
    tolerance: 0
    labels:
      - github
      - repository_metadata
      - dynamic_count
      - stars
    notes: "Ground truth comes from the GitHub REST API stargazers_count field."
    ground_truth:
      method: http_json
      url: "https://api.github.com/repos/vercel/next.js"
      field: "stargazers_count"
      source_url: "github.com/vercel/next.js"

  - id: github_vscode_open_issues
    question: "Using GitHub, how many open issues does the microsoft/vscode repository currently show?"
    required_source: "github.com/microsoft/vscode"
    answer_type: number
    tolerance: 0
    labels:
      - github
      - repository_metadata
      - dynamic_count
      - issues
    notes: "GitHub's open_issues_count includes open pull requests; task wording intentionally says GitHub's displayed open-issues count."
    ground_truth:
      method: http_json
      url: "https://api.github.com/repos/microsoft/vscode"
      field: "open_issues_count"
      source_url: "github.com/microsoft/vscode"

  - id: github_fastapi_forks
    question: "Using GitHub, how many forks does the fastapi/fastapi repository currently show?"
    required_source: "github.com/fastapi/fastapi"
    answer_type: number
    tolerance: 0
    labels:
      - github
      - repository_metadata
      - dynamic_count
      - forks
    notes: "Tests whether a stack can distinguish forks from stars and watchers."
    ground_truth:
      method: http_json
      url: "https://api.github.com/repos/fastapi/fastapi"
      field: "forks_count"
      source_url: "github.com/fastapi/fastapi"

  - id: github_playwright_latest_release
    question: "Using GitHub Releases, what is the latest release tag for microsoft/playwright?"
    required_source: "github.com/microsoft/playwright/releases"
    answer_type: string
    tolerance: 0
    labels:
      - github
      - releases
      - package_version
    notes: "Latest release tags are a common devtool research task and often get confused with npm package versions."
    ground_truth:
      method: http_json
      url: "https://api.github.com/repos/microsoft/playwright/releases/latest"
      field: "tag_name"
      source_url: "github.com/microsoft/playwright/releases/latest"

  - id: github_vue_package_version
    question: "Using Vue's package.json file on GitHub, what is the current top-level version value?"
    required_source: "github.com/vuejs/core/blob/main/packages/vue/package.json"
    answer_type: string
    tolerance: 0
    labels:
      - github
      - repository_file
      - package_version
      - experiment_task
    notes: "Adapted from the original experiment. Ground truth reads the version field from Vue's package.json on GitHub."
    ground_truth:
      method: http_json
      url: "https://raw.githubusercontent.com/vuejs/core/main/packages/vue/package.json"
      field: "version"
      source_url: "github.com/vuejs/core/blob/main/packages/vue/package.json"

  - id: github_react_default_branch
    question: "Using GitHub, what default branch does the facebook/react repository currently list?"
    required_source: "github.com/facebook/react"
    answer_type: string
    tolerance: 0
    labels:
      - github
      - repository_metadata
      - default_branch
    notes: "Catches agents that assume every active repository still uses master or answer from old snippets."
    ground_truth:
      method: http_json
      url: "https://api.github.com/repos/facebook/react"
      field: "default_branch"
      source_url: "github.com/facebook/react"

  - id: github_rust_license_spdx
    question: "Using GitHub, what SPDX license identifier does the rust-lang/rust repository currently list?"
    required_source: "github.com/rust-lang/rust"
    answer_type: string
    tolerance: 0
    labels:
      - github
      - repository_metadata
      - license
    notes: "Tests whether the stack reads GitHub's repository metadata instead of summarizing project licensing from memory."
    ground_truth:
      method: http_json
      url: "https://api.github.com/repos/rust-lang/rust"
      field: "license.spdx_id"
      source_url: "github.com/rust-lang/rust"

  - id: github_nextjs_package_manager
    question: "Using the Next.js package.json file on GitHub, what packageManager value is currently listed?"
    required_source: "github.com/vercel/next.js/blob/canary/package.json"
    answer_type: string
    tolerance: 0
    labels:
      - github
      - repository_file
      - package_manager
    notes: "A raw repository-file task that catches answers from npm package metadata, docs pages, or older lockfile assumptions."
    ground_truth:
      method: http_json
      url: "https://raw.githubusercontent.com/vercel/next.js/canary/package.json"
      field: "packageManager"
      source_url: "github.com/vercel/next.js/blob/canary/package.json"
